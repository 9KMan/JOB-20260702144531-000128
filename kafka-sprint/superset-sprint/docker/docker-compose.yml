version: "3.8"

services:
  # Multi-tenant MariaDB
  mariadb:
    image: mariadb:10.11
    container_name: superset_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: multitenant_saas
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Superset
  superset:
    image: apache/superset:latest
    container_name: superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: superset_secret_key_change_in_production
      DATABASE_HOST: mariadb
      DATABASE_PORT: 3306
      DATABASE_DB: superset_metadata
      DATABASE_USER: root
      DATABASE_PASSWORD: root_secret
    volumes:
      - superset_home:/app/superset_home
      - ./rls:/rls
    depends_on:
      mariadb:
        condition: service_healthy
    command: >
      sh -c "
        pip install --upgrade superset && 
        superset db upgrade &&
        superset fab create-admin --username admin --password admin --firstname Admin --lastname User --email admin@example.com --yes &&
        superset load_examples &&
        superset init &&
        gunicorn --bind 0.0.0.0:8088 --workers 4 --timeout 120 superset.app:app
      "

  # nginx reverse proxy for embedding
  nginx:
    image: nginx:alpine
    container_name: superset_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./embedding/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - superset
    profiles:
      - embedding

volumes:
  mariadb_data:
  superset_home:
