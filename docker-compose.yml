version: '3.9'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medportal
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: medportal
      POSTGRES_PASSWORD: medportal_dev_password
      POSTGRES_DB: medportal
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medportal
volumes:
  postgres_data:
networks:
  medportal:
    driver: bridge