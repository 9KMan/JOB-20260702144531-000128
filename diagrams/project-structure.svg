<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="Project structure of the Internal Automation Platform">
  <title>Project Structure</title>
  <desc>Style B (clean 2D flowchart): slate nodes, professional blue accents, white canvas.</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1000" height="700" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="40" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Project Structure</text>
  <text x="40" y="62" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#475569">Two planes (src/, app/) + aux directories.  Boxes are clickable in the rendered view.</text>

  <!-- Root -->
  <rect x="40" y="100" width="200" height="60" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
  <text x="140" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">JOB-128</text>
  <text x="140" y="143" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">repo root</text>

  <!-- Level 1 children -->
  <g font-family="Helvetica, Arial, sans-serif">
    <!-- src/ -->
    <rect x="40" y="220" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="120" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">src/</text>
    <text x="120" y="256" text-anchor="middle" font-size="10" fill="#64748B">data layer</text>

    <!-- app/ -->
    <rect x="240" y="220" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="320" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">app/</text>
    <text x="320" y="256" text-anchor="middle" font-size="10" fill="#64748B">request plane</text>

    <!-- alembic/ -->
    <rect x="440" y="220" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="500" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">alembic/</text>
    <text x="500" y="256" text-anchor="middle" font-size="10" fill="#64748B">migrations</text>

    <!-- db/ -->
    <rect x="600" y="220" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="660" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">db/</text>
    <text x="660" y="256" text-anchor="middle" font-size="10" fill="#64748B">canonical SQL</text>

    <!-- diagrams/ -->
    <rect x="760" y="220" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="820" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">diagrams/</text>
    <text x="820" y="256" text-anchor="middle" font-size="10" fill="#64748B">SVG</text>

    <!-- scripts/ -->
    <rect x="40" y="320" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="120" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">scripts/</text>
    <text x="120" y="356" text-anchor="middle" font-size="10" fill="#64748B">ops helpers</text>

    <!-- tests/ -->
    <rect x="240" y="320" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="320" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">tests/</text>
    <text x="320" y="356" text-anchor="middle" font-size="10" fill="#64748B">pytest</text>

    <!-- root files -->
    <rect x="440" y="320" width="440" height="50" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <text x="660" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">README.md · SPEC.md · OUT_OF_SCOPE.md</text>
    <text x="660" y="356" text-anchor="middle" font-size="10" fill="#64748B">pyproject.toml · requirements.txt · Dockerfile · docker-compose.yml</text>
  </g>

  <!-- Level 2 children of src/ and app/ -->
  <g font-family="Helvetica, Arial, sans-serif">
    <!-- src/models/ -->
    <rect x="20" y="430" width="200" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="120" y="455" text-anchor="middle" font-size="11" fill="#334155">src/models/ · config.py · database.py</text>

    <!-- app/api -->
    <rect x="240" y="430" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="455" text-anchor="middle" font-size="11" fill="#334155">app/api/</text>

    <!-- app/orchestrator -->
    <rect x="240" y="480" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="505" text-anchor="middle" font-size="11" fill="#334155">app/orchestrator/</text>

    <!-- app/models -->
    <rect x="240" y="530" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="555" text-anchor="middle" font-size="11" fill="#334155">app/models/</text>

    <!-- app/observability -->
    <rect x="240" y="580" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="605" text-anchor="middle" font-size="11" fill="#334155">app/observability/</text>

    <!-- app/schemas -->
    <rect x="420" y="430" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="500" y="455" text-anchor="middle" font-size="11" fill="#334155">app/schemas/</text>

    <!-- app/ui -->
    <rect x="420" y="480" width="160" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="500" y="505" text-anchor="middle" font-size="11" fill="#334155">app/ui/</text>

    <!-- alembic versions -->
    <rect x="600" y="430" width="180" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="690" y="455" text-anchor="middle" font-size="11" fill="#334155">alembic/versions/</text>

    <!-- alembic env.py -->
    <rect x="600" y="480" width="180" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="690" y="505" text-anchor="middle" font-size="11" fill="#334155">alembic/env.py</text>

    <!-- db migrations -->
    <rect x="600" y="530" width="180" height="40" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="690" y="555" text-anchor="middle" font-size="11" fill="#334155">db/migrations/</text>
  </g>

  <!-- Connectors from root to level 1 -->
  <g stroke="#2563EB" stroke-width="1.5" fill="none">
    <line x1="140" y1="160" x2="120" y2="220"/>
    <line x1="140" y1="160" x2="320" y2="220"/>
    <line x1="140" y1="160" x2="500" y2="220"/>
    <line x1="140" y1="160" x2="660" y2="220"/>
    <line x1="140" y1="160" x2="820" y2="220"/>
    <line x1="140" y1="160" x2="120" y2="320"/>
    <line x1="140" y1="160" x2="320" y2="320"/>
    <line x1="140" y1="160" x2="660" y2="320"/>
  </g>

  <!-- Connectors to level 2 -->
  <g stroke="#94A3B8" stroke-width="1.2" fill="none">
    <line x1="320" y1="270" x2="120" y2="430"/>
    <line x1="320" y1="270" x2="320" y2="430"/>
    <line x1="320" y1="270" x2="320" y2="480"/>
    <line x1="320" y1="270" x2="320" y2="530"/>
    <line x1="320" y1="270" x2="320" y2="580"/>
    <line x1="320" y1="270" x2="500" y2="430"/>
    <line x1="320" y1="270" x2="500" y2="480"/>
    <line x1="500" y1="270" x2="690" y2="430"/>
    <line x1="500" y1="270" x2="690" y2="480"/>
    <line x1="660" y1="270" x2="690" y2="530"/>
  </g>

  <!-- Legend -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">
    <rect x="40" y="650" width="14" height="14" fill="#FFFFFF" stroke="#334155" stroke-width="2"/>
    <text x="60" y="662">directory</text>
    <rect x="180" y="650" width="14" height="14" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/>
    <text x="200" y="662">sub-directory</text>
    <rect x="340" y="650" width="14" height="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="3"/>
    <text x="360" y="662">root or root-level file group</text>
  </g>
</svg>