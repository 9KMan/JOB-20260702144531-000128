<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-label="Architecture overview of the Internal Automation Platform">
  <title>Internal Automation Platform — Architecture</title>
  <desc>Style A (isometric tech): navy boxes for data layer, teal boxes for app layer, white canvas.</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1100" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="40" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0B2545">Internal Automation Platform — Architecture</text>
  <text x="40" y="62" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#334155">Two-plane split: data layer (src/) and request/response plane (app/).</text>

  <!-- Outer plane boxes -->
  <rect x="40" y="90" width="500" height="600" rx="14" fill="#F8FAFC" stroke="#0B2545" stroke-width="2"/>
  <rect x="560" y="90" width="500" height="600" rx="14" fill="#F8FAFC" stroke="#1B9AAA" stroke-width="2"/>

  <text x="60" y="118" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B2545">src/ — Data Layer</text>
  <text x="60" y="136" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">CLI tools · migrations · no FastAPI</text>

  <text x="580" y="118" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B6E78">app/ — Request / Response Plane</text>
  <text x="580" y="136" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">FastAPI · orchestration · observability</text>

  <!-- src/ plane boxes -->
  <g>
    <!-- Alembic -->
    <rect x="70" y="160" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#0B2545" stroke-width="2"/>
    <text x="88" y="186" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B2545">Alembic Migrations</text>
    <text x="88" y="206" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">alembic/versions/001_initial.py</text>
    <text x="88" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Autogenerated from db/migrations/*.sql</text>

    <!-- SQL DDL -->
    <rect x="70" y="260" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#0B2545" stroke-width="2"/>
    <text x="88" y="286" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B2545">Canonical DDL</text>
    <text x="88" y="306" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">db/migrations/001_initial.sql</text>
    <text x="88" y="322" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Hand-written, single source of truth</text>

    <!-- Models mirror -->
    <rect x="70" y="360" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#0B2545" stroke-width="2"/>
    <text x="88" y="386" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B2545">SQLAlchemy Models (re-export)</text>
    <text x="88" y="406" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">src/models/*.py</text>
    <text x="88" y="422" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Mirrors app/models/*.py for Alembic discovery</text>

    <!-- Database -->
    <rect x="70" y="460" width="440" height="100" rx="10" fill="#FFFFFF" stroke="#0B2545" stroke-width="3"/>
    <text x="88" y="486" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B2545">PostgreSQL 14+</text>
    <text x="88" y="506" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">users · permissions · roles · ingested_rows</text>
    <text x="88" y="522" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">templates · template_versions · suggestions</text>
    <text x="88" y="538" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">audit_logs (append-only trigger enforced)</text>

    <!-- CLI smoke test -->
    <rect x="70" y="580" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#0B2545" stroke-width="2"/>
    <text x="88" y="606" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B2545">CLI / Smoke</text>
    <text x="88" y="626" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">scripts/verify_stack.py</text>
    <text x="88" y="642" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">scripts/seed_dev.py · scripts/start_workers.sh</text>
  </g>

  <!-- app/ plane boxes -->
  <g>
    <!-- FastAPI entry -->
    <rect x="590" y="160" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#1B9AAA" stroke-width="2"/>
    <text x="608" y="186" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B6E78">FastAPI Entry Point</text>
    <text x="608" y="206" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">app/main.py — routers · middleware · logging</text>
    <text x="608" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">15 endpoints across /api/v1/*</text>

    <!-- API routers -->
    <rect x="590" y="260" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#1B9AAA" stroke-width="2"/>
    <text x="608" y="286" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B6E78">HTTP Routers</text>
    <text x="608" y="306" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">app/api/{tasks,agents,runs,review}.py</text>
    <text x="608" y="322" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Pydantic v2 schemas · dependency injection</text>

    <!-- Orchestrator -->
    <rect x="590" y="360" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#1B9AAA" stroke-width="2"/>
    <text x="608" y="386" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B6E78">Orchestrator (Pure Python)</text>
    <text x="608" y="406" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">ingest · templates · suggestions · review · audit</text>
    <text x="608" y="422" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">identity (RBAC) · workers (Celery glue)</text>

    <!-- Observability -->
    <rect x="590" y="460" width="440" height="80" rx="10" fill="#FFFFFF" stroke="#1B9AAA" stroke-width="2"/>
    <text x="608" y="486" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B6E78">Observability</text>
    <text x="608" y="506" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">app/observability/logging.py — structlog JSON</text>
    <text x="608" y="522" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">app/observability/tracing.py — OpenTelemetry</text>

    <!-- Celery workers -->
    <rect x="590" y="560" width="440" height="100" rx="10" fill="#FFFFFF" stroke="#1B9AAA" stroke-width="3"/>
    <text x="608" y="586" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0B6E78">Celery Worker Pool</text>
    <text x="608" y="606" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">scripts/start_workers.sh</text>
    <text x="608" y="622" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Broker: Redis 5+</text>
    <text x="608" y="638" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155">Backend: Redis 5+</text>
  </g>

  <!-- Cross-plane arrows -->
  <g stroke="#94A3B8" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 510 200 C 540 200, 560 200, 590 200"/>
    <path d="M 510 400 C 540 400, 560 400, 590 400"/>
    <path d="M 510 510 C 540 510, 560 510, 590 500"/>
    <path d="M 290 440 L 290 460"/>
    <path d="M 590 610 C 540 610, 540 580, 510 580"/>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>