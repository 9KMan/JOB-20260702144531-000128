server {
    listen 80;
    server_name _;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://superset-app:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Superset
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /embedded/ {
        # Embedded dashboards (iframe mode)
        proxy_pass http://superset-app:8088/api/v1/embedded/;
        proxy_set_header Host $host;
        
        # Allow framing for embedding
        add_header X-Frame-Options "ALLOWALL" always;
    }

    location /api/guest-token {
        # Proxy to backend auth service
        proxy_pass http://host.docker.internal:3000/api/guest-token;
        proxy_set_header Host $host;
    }
}
