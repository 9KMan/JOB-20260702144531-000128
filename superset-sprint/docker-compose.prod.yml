# Superset Multi-Tenant Production Docker Compose
version: "3.9"

networks:
  superset-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  superset_home:
  prometheus_data:
  grafana_data:

services:
  db:
    image: postgres:16-alpine
    container_name: superset-db
    restart: always
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - superset-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: superset-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - superset-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    image: apache/superset:4.0.1
    container_name: superset-app
    restart: always
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    env_file:
      - .env
    environment:
      SUPERSET_DB_HOST: db
      SUPERSET_DB_PORT: 5432
      SUPERSET_DB_USER: superset
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - superset-network
    healthcheck:
      test: ["CMD", "curl", "-kf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker:
    image: apache/superset:4.0.1
    container_name: superset-celery-worker
    restart: always
    env_file:
      - .env
    environment:
      SUPERSET_DB_HOST: db
      SUPERSET_DB_PORT: 5432
      SUPERSET_DB_USER: superset
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      - redis
      - db
    networks:
      - superset-network
    command: celery -A superset.tasks.celery_app worker --loglevel=info

  superset-exporter:
    image: quay.io/prometheuscommunity/superset-exporter:latest
    container_name: superset-exporter
    ports:
      - "9100:9100"
    environment:
      METRICS_ENDPOINT: "http://superset:8088/health"
      METRICS_INTERVAL: 30
    networks:
      - superset-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-Admin1234}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-network

volumes:
  postgres_data:
  redis_data:
  superset_home:
  prometheus_data:
  grafana_data:
